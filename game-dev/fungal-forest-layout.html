<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1.0">
<title>真菌森林展示场景 — 布局图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: -apple-system, system-ui, sans-serif;
    padding: 24px;
  }
  .sheet {
    background: #16213e;
    border-radius: 16px; padding: 40px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    max-width: 1200px;
  }
  h1 {
    color: #e0e7ff; font-size: 24px; font-weight: 700;
    margin-bottom: 4px; text-align: center;
  }
  .subtitle {
    color: #8b9dc3; font-size: 13px; text-align: center; margin-bottom: 28px;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex; gap: 24px; justify-content: center; margin-top: 24px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px; color: #c4ccde; font-size: 12px;
  }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
</style>
</head>
<body>
<div class="sheet">
  <h1>真菌森林展示场景 · 俯视布局</h1>
  <p class="subtitle">Pearls on a String · 珠串式结构 · 总长约 120m</p>

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 620" width="1100" height="620">

    <!-- ====== DEFS ====== -->
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
      </marker>
      <marker id="arrowWarm" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
      </marker>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="shadow">
        <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
      </filter>
    </defs>

    <!-- ====== BACKGROUND TERRAIN ====== -->
    <!-- Base ground -->
    <rect x="40" y="80" width="1020" height="480" rx="20" fill="#1e3a2f" opacity="0.6"/>

    <!-- Path connectors drawn BEFORE nodes so they sit behind -->
    <!-- A→B -->
    <path d="M 160,320 C 180,320 200,320 220,320" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.6"/>
    <!-- B→C -->
    <path d="M 380,320 C 400,320 420,320 440,320" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.6"/>
    <!-- C→D -->
    <path d="M 590,320 C 610,320 630,320 650,320" stroke="#ef4444" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.6"/>
    <!-- D→E -->
    <path d="M 780,320 C 800,320 820,320 840,320" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.6"/>
    <!-- E→F -->
    <path d="M 990,320 C 1010,320 1020,320 1030,320" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrowWarm)" stroke-dasharray="8,4" opacity="0.6"/>

    <!-- ====== A: 森林入口 ====== -->
    <g filter="url(#shadow)">
      <ellipse cx="120" cy="320" rx="60" ry="55" fill="#2d4a3e" stroke="#4ade80" stroke-width="2" stroke-dasharray="4,2"/>
      <text x="120" y="310" text-anchor="middle" fill="#86efac" font-size="13" font-weight="700">🌿 森林入口</text>
      <text x="120" y="328" text-anchor="middle" fill="#9ca3af" font-size="11">A 区 · 安全区</text>
      <text x="120" y="344" text-anchor="middle" fill="#6b7280" font-size="10">15×15m · ~60s</text>
      <!-- Start marker -->
      <circle cx="95" cy="320" r="5" fill="#4ade80"/>
      <text x="95" y="314" text-anchor="middle" fill="#4ade80" font-size="9">START</text>
    </g>

    <!-- ====== B: 幽光走廊 ====== -->
    <g filter="url(#shadow)">
      <path d="M 230,290 C 270,290 310,310 350,310 C 370,310 380,330 380,350" stroke="#6366f1" stroke-width="24" fill="none" opacity="0.3" stroke-linecap="round"/>
      <path d="M 230,290 C 270,290 310,310 350,310 C 370,310 380,330 380,350" stroke="#6366f1" stroke-width="2" fill="none" stroke-dasharray="6,3"/>

      <text x="320" y="280" text-anchor="middle" fill="#a5b4fc" font-size="13" font-weight="700">🍄 幽光走廊</text>
      <text x="320" y="296" text-anchor="middle" fill="#9ca3af" font-size="11">B 区 · 探索区</text>
      <text x="320" y="312" text-anchor="middle" fill="#6b7280" font-size="10">S形走廊 ~50m · ~90s</text>

      <!-- POI markers -->
      <circle cx="280" cy="295" r="4" fill="#818cf8" opacity="0.8"/>
      <text x="280" y="275" text-anchor="middle" fill="#818cf8" font-size="8">发光巨菇</text>
      <circle cx="360" cy="340" r="4" fill="#818cf8" opacity="0.8"/>
      <text x="360" y="362" text-anchor="middle" fill="#818cf8" font-size="8">孢子瀑布</text>
    </g>

    <!-- ====== C: 腐木空地 ====== -->
    <g filter="url(#shadow)">
      <ellipse cx="520" cy="320" rx="65" ry="50" fill="#3b2f2f" stroke="#ef4444" stroke-width="2"/>
      <text x="520" y="308" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="700">⚔ 腐木空地</text>
      <text x="520" y="326" text-anchor="middle" fill="#9ca3af" font-size="11">C 区 · 小型遭遇</text>
      <text x="520" y="344" text-anchor="middle" fill="#6b7280" font-size="10">20×18m · ~120s</text>

      <!-- Terrain features inside -->
      <rect x="495" y="310" width="50" height="10" rx="3" fill="#78350f" opacity="0.6"/>
      <text x="520" y="335" text-anchor="middle" fill="#92400e" font-size="7">倒木 (掩体)</text>
      <circle cx="482" cy="305" r="4" fill="#57534e"/>
      <circle cx="555" cy="338" r="4" fill="#57534e"/>
      <circle cx="500" cy="340" r="3" fill="#57534e"/>
      <circle cx="545" cy="303" r="3" fill="#57534e"/>

      <!-- Enemy markers -->
      <text x="490" y="295" text-anchor="middle" fill="#ef4444" font-size="10">👾 真菌幼体×2</text>
    </g>

    <!-- ====== D: 深菇峡谷 ====== -->
    <g filter="url(#shadow)">
      <path d="M 640,295 L 730,295 L 730,345 L 640,345 Z" fill="#1e1b4b" stroke="#7c3aed" stroke-width="2" rx="4"/>
      <text x="685" y="314" text-anchor="middle" fill="#c4b5fd" font-size="13" font-weight="700">🌑 深菇峡谷</text>
      <text x="685" y="330" text-anchor="middle" fill="#9ca3af" font-size="11">D 区 · 走廊2</text>
      <text x="685" y="346" text-anchor="middle" fill="#6b7280" font-size="10">~30m · ~60s</text>

      <!-- Canyon walls -->
      <line x1="640" y1="295" x2="730" y2="295" stroke="#7c3aed" stroke-width="3" opacity="0.5"/>
      <line x1="640" y1="345" x2="730" y2="345" stroke="#7c3aed" stroke-width="3" opacity="0.5"/>

      <!-- Light at end -->
      <ellipse cx="740" cy="320" rx="15" ry="20" fill="#fef08a" opacity="0.15"/>
    </g>

    <!-- ====== E: 巨菇王座 ====== -->
    <g filter="url(#shadow)">
      <circle cx="900" cy="320" r="70" fill="#2d1b4e" stroke="#f59e0b" stroke-width="3"/>
      <text x="900" y="295" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="700">👑 巨菇王座</text>
      <text x="900" y="313" text-anchor="middle" fill="#9ca3af" font-size="11">E 区 · BOSS 竞技场</text>
      <text x="900" y="331" text-anchor="middle" fill="#6b7280" font-size="10">30×25m · ~180s</text>

      <!-- Central giant mushroom -->
      <circle cx="900" cy="320" r="18" fill="#78350f" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>
      <text x="900" y="324" text-anchor="middle" fill="#fbbf24" font-size="8">中央巨菇</text>

      <!-- Spore clouds -->
      <circle cx="870" cy="300" r="8" fill="#10b981" opacity="0.25" stroke="#34d399" stroke-width="1" stroke-dasharray="3,2"/>
      <circle cx="930" cy="340" r="8" fill="#10b981" opacity="0.25" stroke="#34d399" stroke-width="1" stroke-dasharray="3,2"/>
      <circle cx="880" cy="350" r="8" fill="#10b981" opacity="0.25" stroke="#34d399" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="870" y="290" text-anchor="middle" fill="#34d399" font-size="7">孢子云</text>
      <text x="930" y="355" text-anchor="middle" fill="#34d399" font-size="7">孢子云</text>

      <!-- Mushroom ring -->
      <circle cx="900" cy="320" r="50" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6,8" opacity="0.4"/>

      <!-- Enemy markers -->
      <text x="910" y="280" text-anchor="middle" fill="#ef4444" font-size="11">👾 真菌之主 (BOSS)</text>
      <text x="858" y="360" text-anchor="middle" fill="#ef4444" font-size="9">小怪×2</text>
    </g>

    <!-- ====== F: 孢子之径 ====== -->
    <g filter="url(#shadow)">
      <ellipse cx="1055" cy="320" rx="35" ry="45" fill="#3b3a1e" stroke="#f59e0b" stroke-width="2" stroke-dasharray="4,2"/>
      <text x="1055" y="312" text-anchor="middle" fill="#fde68a" font-size="13" font-weight="700">✨ 孢子之径</text>
      <text x="1055" y="328" text-anchor="middle" fill="#9ca3af" font-size="11">F 区 · 收束</text>
      <text x="1055" y="344" text-anchor="middle" fill="#6b7280" font-size="10">~30s · 结尾</text>
    </g>

    <!-- ====== TIMELINE BAR ====== -->
    <g transform="translate(40, 540)">
      <rect x="0" y="0" width="1020" height="32" rx="6" fill="#0f172a" opacity="0.5"/>
      <!-- Segments -->
      <rect x="20" y="6" width="100" height="20" rx="4" fill="#2d4a3e"/>
      <text x="70" y="20" text-anchor="middle" fill="#86efac" font-size="10">入口 60s</text>

      <rect x="130" y="6" width="160" height="20" rx="4" fill="#312e81"/>
      <text x="210" y="20" text-anchor="middle" fill="#a5b4fc" font-size="10">探索走廊 90s</text>

      <rect x="300" y="6" width="200" height="20" rx="4" fill="#3b2f2f"/>
      <text x="400" y="20" text-anchor="middle" fill="#fca5a5" font-size="10">小型遭遇 120s</text>

      <rect x="510" y="6" width="100" height="20" rx="4" fill="#1e1b4b"/>
      <text x="560" y="20" text-anchor="middle" fill="#c4b5fd" font-size="10">峡谷 60s</text>

      <rect x="620" y="6" width="300" height="20" rx="4" fill="#2d1b4e"/>
      <text x="770" y="20" text-anchor="middle" fill="#fcd34d" font-size="10">BOSS 竞技场 180s</text>

      <rect x="930" y="6" width="70" height="20" rx="4" fill="#3b3a1e"/>
      <text x="965" y="20" text-anchor="middle" fill="#fde68a" font-size="10">30s</text>

      <!-- Emotion labels -->
      <text x="70" y="50" text-anchor="middle" fill="#9ca3af" font-size="9">好奇</text>
      <text x="210" y="50" text-anchor="middle" fill="#9ca3af" font-size="9">沉浸</text>
      <text x="400" y="50" text-anchor="middle" fill="#9ca3af" font-size="9">紧张</text>
      <text x="560" y="50" text-anchor="middle" fill="#9ca3af" font-size="9">压抑</text>
      <text x="770" y="50" text-anchor="middle" fill="#9ca3af" font-size="9">🔥 高潮</text>
      <text x="965" y="50" text-anchor="middle" fill="#9ca3af" font-size="9">释放</text>
    </g>

    <!-- ====== LEGEND IN SVG ====== -->
    <g transform="translate(40, 580)">
      <rect x="0" y="0" width="14" height="14" rx="3" fill="#2d4a3e" stroke="#4ade80" stroke-width="1"/>
      <text x="18" y="12" fill="#c4ccde" font-size="11">安全/探索区</text>

      <rect x="130" y="0" width="14" height="14" rx="3" fill="#3b2f2f" stroke="#ef4444" stroke-width="1"/>
      <text x="148" y="12" fill="#c4ccde" font-size="11">战斗区</text>

      <rect x="240" y="0" width="14" height="14" rx="3" fill="#2d1b4e" stroke="#f59e0b" stroke-width="2"/>
      <text x="258" y="12" fill="#c4ccde" font-size="11">BOSS 区</text>

      <circle cx="400" cy="7" r="7" fill="none" stroke="#34d399" stroke-width="1" stroke-dasharray="3,2"/>
      <text x="412" y="12" fill="#c4ccde" font-size="11">孢子云 (动态掩体)</text>

      <circle cx="560" cy="7" r="5" fill="#4ade80"/>
      <text x="570" y="12" fill="#c4ccde" font-size="11">起始点</text>

      <circle cx="680" cy="7" r="4" fill="#818cf8"/>
      <text x="690" y="12" fill="#c4ccde" font-size="11">兴趣点 (POI)</text>
    </g>

  </svg>

  <div class="legend" style="margin-top: 20px;">
    <div class="legend-item">
      <div class="legend-swatch" style="background:#2d4a3e;border:1px solid #4ade80;"></div> 探索区
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#3b2f2f;border:1px solid #ef4444;"></div> 战斗区
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:#2d1b4e;border:2px solid #f59e0b;"></div> BOSS区
    </div>
    <div class="legend-item">
      <div class="legend-swatch" style="background:transparent;border:1px dashed #34d399;"></div> 动态掩体
    </div>
    <div class="legend-item">● 起始点</div>
    <div class="legend-item">◆ 兴趣点</div>
  </div>
</div>
</body>
</html>

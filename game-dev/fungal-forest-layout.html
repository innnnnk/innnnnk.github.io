<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200, initial-scale=1.0">
<title>真菌森林展示场景 — 布局图</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; font-family: -apple-system, system-ui, sans-serif;
    padding: 24px;
  }
  .sheet {
    background: #16213e;
    border-radius: 16px; padding: 40px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.5);
    max-width: 1300px;
  }
  h1 {
    color: #e0e7ff; font-size: 24px; font-weight: 700;
    margin-bottom: 4px; text-align: center;
  }
  .subtitle {
    color: #8b9dc3; font-size: 13px; text-align: center; margin-bottom: 28px;
  }
  svg { display: block; margin: 0 auto; }
  .legend {
    display: flex; gap: 24px; justify-content: center; margin-top: 24px;
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex; align-items: center; gap: 8px; color: #c4ccde; font-size: 12px;
  }
  .legend-swatch { width: 14px; height: 14px; border-radius: 3px; }
</style>
</head>
<body>
<div class="sheet">
  <h1>真菌森林展示场景 · 俯视布局</h1>
  <p class="subtitle">珠串式结构 · 总长约 120m · 预计 60 分钟体验</p>

  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 680" width="1200" height="680">

    <!-- ====== DEFS ====== -->
    <defs>
      <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#64748b"/>
      </marker>
      <marker id="arrowWarm" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#f59e0b"/>
      </marker>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="shadow">
        <feDropShadow dx="1" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/>
      </filter>
      <!-- Flicker animation for anomaly markers -->
      <filter id="flickerGlow">
        <feGaussianBlur stdDeviation="2" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>

    <!-- ====== BACKGROUND TERRAIN ====== -->
    <rect x="20" y="60" width="1160" height="520" rx="20" fill="#1e3a2f" opacity="0.5"/>

    <!-- ====== CONNECTORS ====== -->
    <!-- A→B -->
    <path d="M 170,320 C 200,320 210,320 240,320" stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.5"/>
    <!-- B→C -->
    <path d="M 430,320 C 460,320 470,320 500,320" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.5"/>
    <!-- C→D -->
    <path d="M 670,320 C 700,320 710,320 740,320" stroke="#ef4444" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.5"/>
    <!-- D→E -->
    <path d="M 880,320 C 910,320 920,320 950,320" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.5"/>
    <!-- E→F -->
    <path d="M 1100,320 C 1120,320 1130,320 1145,320" stroke="#f59e0b" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="8,4" opacity="0.5"/>

    <!-- ================================================================== -->
    <!-- A 区：森林入口 -->
    <!-- ================================================================== -->
    <g filter="url(#shadow)">
      <ellipse cx="120" cy="320" rx="65" ry="55" fill="#2d4a3e" stroke="#4ade80" stroke-width="2" stroke-dasharray="4,2"/>
      <text x="120" y="295" text-anchor="middle" fill="#86efac" font-size="14" font-weight="700">🌿 A · 森林入口</text>
      <text x="120" y="313" text-anchor="middle" fill="#9ca3af" font-size="11">15×15m · ~60s · 好奇</text>

      <!-- START marker -->
      <circle cx="85" cy="320" r="5" fill="#4ade80"/>
      <text x="85" y="312" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="700">START</text>

      <!-- Anomalous mushroom 8m ahead of spawn -->
      <g filter="url(#flickerGlow)">
        <text x="125" y="338" text-anchor="middle" font-size="16" opacity="0.9">🍄</text>
        <text x="125" y="354" text-anchor="middle" fill="#fbbf24" font-size="8">异常蘑菇</text>
        <text x="125" y="365" text-anchor="middle" fill="#d97706" font-size="7">菌盖朝向玩家</text>
        <line x1="105" y1="340" x2="90" y2="340" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="3,2" opacity="0.6"/>
        <!-- Arrow showing mushroom cap direction (toward spawn = "wrong" direction) -->
        <polygon points="100,340 94,336 94,344" fill="#fbbf24" opacity="0.7"/>
      </g>

      <!-- Identity selection prompt -->
      <rect x="130" y="295" width="48" height="20" rx="4" fill="#1e40af" opacity="0.7" stroke="#60a5fa" stroke-width="1"/>
      <text x="154" y="309" text-anchor="middle" fill="#93c5fd" font-size="8">选职业</text>

      <!-- Employer NPC -->
      <circle cx="150" cy="305" r="5" fill="#fbbf24" opacity="0.8"/>
      <text x="150" y="295" text-anchor="middle" fill="#fcd34d" font-size="8">委托人</text>
    </g>

    <!-- ================================================================== -->
    <!-- B 区：幽光走廊 -->
    <!-- ================================================================== -->
    <g filter="url(#shadow)">
      <!-- S-shaped corridor -->
      <path d="M 240,290 C 290,290 310,310 350,310 C 390,310 400,330 430,350" stroke="#6366f1" stroke-width="28" fill="none" opacity="0.2" stroke-linecap="round"/>
      <path d="M 240,290 C 290,290 310,310 350,310 C 390,310 400,330 430,350" stroke="#6366f1" stroke-width="2" fill="none" stroke-dasharray="6,3"/>

      <text x="340" y="268" text-anchor="middle" fill="#a5b4fc" font-size="14" font-weight="700">🍄 B · 幽光走廊</text>
      <text x="340" y="284" text-anchor="middle" fill="#9ca3af" font-size="11">S形走廊 ~50m · ~90s · 沉浸</text>

      <!-- Camp ruins -->
      <rect x="275" y="298" width="36" height="20" rx="3" fill="#78350f" opacity="0.5" stroke="#92400e" stroke-width="1"/>
      <text x="293" y="311" text-anchor="middle" fill="#d97706" font-size="7">营地残骸</text>

      <!-- Miner diary -->
      <circle cx="305" cy="290" r="3" fill="#fbbf24"/>
      <text x="318" y="290" fill="#fcd34d" font-size="7">矿工日记</text>

      <!-- Mycelium-covered body -->

      <text x="350" y="332" text-anchor="middle" fill="#a5b4fc" font-size="6">菌丝覆身形</text>

      <!-- Dogtags ×3 scattered around camp -->
      <g fill="#fbbf24" opacity="0.9">
        <rect x="282" y="322" width="5" height="7" rx="1"/>
        <text x="285" y="334" text-anchor="middle" fill="#fcd34d" font-size="5">🏷️</text>
        <rect x="338" y="312" width="5" height="7" rx="1"/>
        <text x="341" y="324" text-anchor="middle" fill="#fcd34d" font-size="5">🏷️</text>
        <rect x="370" y="338" width="5" height="7" rx="1"/>
        <text x="373" y="350" text-anchor="middle" fill="#fcd34d" font-size="5">🏷️</text>
      </g>

      <!-- Dwarf rescue point -->
      <g filter="url(#flickerGlow)">
        <circle cx="415" cy="340" r="7" fill="#f59e0b" opacity="0.6" stroke="#fbbf24" stroke-width="1.5"/>
        <text x="415" y="343" text-anchor="middle" fill="#fef08a" font-size="9">⚒️</text>
        <text x="415" y="356" text-anchor="middle" fill="#fcd34d" font-size="8" font-weight="700">解救矮人</text>
        <text x="415" y="367" text-anchor="middle" fill="#d97706" font-size="6">脖子上有铭牌</text>
      </g>

      <!-- Companion joins marker -->
      <text x="425" y="310" fill="#fbbf24" font-size="7" text-anchor="middle">→ 同伴加入</text>
    </g>

    <!-- ================================================================== -->
    <!-- C 区：腐木空地 -->
    <!-- ================================================================== -->
    <g filter="url(#shadow)">
      <ellipse cx="580" cy="320" rx="75" ry="55" fill="#3b2f2f" stroke="#ef4444" stroke-width="2.5"/>
      <text x="580" y="293" text-anchor="middle" fill="#fca5a5" font-size="14" font-weight="700">⚔ C · 腐木空地</text>
      <text x="580" y="311" text-anchor="middle" fill="#9ca3af" font-size="11">20×18m · ~120s · 紧张</text>

      <!-- Fallen log cover -->

      <text x="578" y="319" text-anchor="middle" fill="#92400e" font-size="7">倒木 (掩体)</text>

      <!-- Mycelium Host ×2 -->
      <g filter="url(#flickerGlow)">
        <circle cx="535" cy="305" r="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
        <text x="535" y="308" text-anchor="middle" fill="#fca5a5" font-size="9">🧟</text>
        <text x="535" y="295" text-anchor="middle" fill="#ef4444" font-size="8">菌丝宿主</text>
      </g>
      <g filter="url(#flickerGlow)">
        <circle cx="620" cy="340" r="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5"/>
        <text x="620" y="343" text-anchor="middle" fill="#fca5a5" font-size="9">🧟</text>
        <text x="620" y="355" text-anchor="middle" fill="#ef4444" font-size="8">菌丝宿主</text>
      </g>

      <!-- Dogtags dropped after kill -->
      <text x="545" y="330" text-anchor="middle" fill="#fcd34d" font-size="6">🏷️ 干壳掉铭牌</text>
      <text x="630" y="330" text-anchor="middle" fill="#fcd34d" font-size="6">🏷️ 干壳掉铭牌</text>

      <!-- Companion fights alongside -->
      <circle cx="570" cy="340" r="6" fill="#fbbf24" opacity="0.6" stroke="#f59e0b" stroke-width="1"/>
      <text x="570" y="343" text-anchor="middle" fill="#fef08a" font-size="7">⚒️</text>
      <text x="570" y="356" text-anchor="middle" fill="#fcd34d" font-size="7">同伴并肩</text>

      <!-- Companion pauses to recognize host -->
      <text x="505" y="365" text-anchor="middle" fill="#fbbf24" font-size="6" opacity="0.8">识别停顿 0.3s</text>

      <!-- Kill sequence note -->
      <text x="580" y="370" text-anchor="middle" fill="#9ca3af" font-size="6" font-style="italic">击杀→孢子释放→萎缩→长蘑菇</text>
    </g>

    <!-- ================================================================== -->
    <!-- D 区：深菇峡谷 -->
    <!-- ================================================================== -->
    <g filter="url(#shadow)">
      <rect x="710" y="285" width="120" height="70" rx="6" fill="#1e1b4b" stroke="#7c3aed" stroke-width="2"/>
      <text x="770" y="302" text-anchor="middle" fill="#c4b5fd" font-size="14" font-weight="700">🌑 D · 深菇峡谷</text>
      <text x="770" y="318" text-anchor="middle" fill="#9ca3af" font-size="11">~30m · ~60s · 压抑</text>

      <!-- Canyon walls -->
      <line x1="710" y1="285" x2="830" y2="285" stroke="#7c3aed" stroke-width="4" opacity="0.5"/>
      <line x1="710" y1="355" x2="830" y2="355" stroke="#7c3aed" stroke-width="4" opacity="0.5"/>

      <!-- Mycelium veins on wall -->
      <path d="M 720,295 Q 730,310 725,325 Q 720,340 730,350" stroke="#818cf8" stroke-width="2" fill="none" opacity="0.4"/>
      <path d="M 740,292 Q 750,305 745,320 Q 740,335 748,348" stroke="#818cf8" stroke-width="2" fill="none" opacity="0.4"/>

      <!-- Dogtags pierced by mycelium -->
      <text x="728" y="325" font-size="7" fill="#fcd34d">🏷️</text>
      <text x="732" y="328" font-size="5" fill="#a5b4fc">菌丝穿过铭牌</text>
      <text x="758" y="340" font-size="7" fill="#fcd34d">🏷️</text>

      <!-- Spiral marking on wall -->
      <circle cx="795" cy="310" r="6" fill="none" stroke="#c084fc" stroke-width="1" opacity="0.6"/>
      <circle cx="795" cy="310" r="3" fill="none" stroke="#c084fc" stroke-width="0.7" opacity="0.4"/>
      <text x="795" y="300" text-anchor="middle" fill="#c084fc" font-size="6">螺旋纹路</text>

      <!-- Shadow anomaly -->
      <text x="770" y="345" text-anchor="middle" fill="#c4b5fd" font-size="6" opacity="0.7">🎴 影子异常 · 嗡鸣</text>

      <!-- Companion whispers -->
      <text x="770" y="370" text-anchor="middle" fill="#d97706" font-size="6" font-style="italic">"有人摸我后脑勺"</text>

      <!-- Light at end of canyon -->
      <ellipse cx="840" cy="320" rx="18" ry="25" fill="#fef08a" opacity="0.12"/>
      <text x="840" y="340" text-anchor="middle" fill="#fde68a" font-size="6" opacity="0.5">前方有光</text>
    </g>

    <!-- ================================================================== -->
    <!-- E 区：巨菇王座 -->
    <!-- ================================================================== -->
    <g filter="url(#shadow)">
      <circle cx="1020" cy="320" r="80" fill="#2d1b4e" stroke="#f59e0b" stroke-width="3"/>
      <text x="1020" y="268" text-anchor="middle" fill="#fcd34d" font-size="14" font-weight="700">👑 E · 巨菇王座 (BOSS)</text>
      <text x="1020" y="285" text-anchor="middle" fill="#9ca3af" font-size="11">30×25m · ~180s · 高潮</text>

      <!-- Central mycelium nexus -->
      <circle cx="1020" cy="320" r="20" fill="#4a1d6b" stroke="#f59e0b" stroke-width="2" opacity="0.8"/>
      <text x="1020" y="317" text-anchor="middle" fill="#fbbf24" font-size="7">菌丝节点</text>
      <text x="1020" y="328" text-anchor="middle" fill="#c084fc" font-size="6">人形凹陷</text>

      <!-- Spore clouds ×3 -->
      <circle cx="980" cy="290" r="10" fill="#10b981" opacity="0.2" stroke="#34d399" stroke-width="1.2" stroke-dasharray="3,2"/>
      <text x="980" y="282" text-anchor="middle" fill="#34d399" font-size="7">孢子云</text>
      <circle cx="1060" cy="350" r="10" fill="#10b981" opacity="0.2" stroke="#34d399" stroke-width="1.2" stroke-dasharray="3,2"/>
      <text x="1060" y="364" text-anchor="middle" fill="#34d399" font-size="7">孢子云</text>
      <circle cx="980" cy="360" r="10" fill="#10b981" opacity="0.2" stroke="#34d399" stroke-width="1.2" stroke-dasharray="3,2"/>
      <text x="964" y="364" text-anchor="middle" fill="#34d399" font-size="7">孢子云</text>

      <!-- Mushroom ring -->
      <circle cx="1020" cy="320" r="55" fill="none" stroke="#f59e0b" stroke-width="1" stroke-dasharray="6,8" opacity="0.35"/>

      <!-- Boss marker -->
      <circle cx="1020" cy="310" r="10" fill="#991b1b" stroke="#ef4444" stroke-width="2"/>

      <!-- Minions -->
      <circle cx="970" cy="340" r="5" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
      <text x="960" y="336" fill="#fca5a5" font-size="6">小怪</text>
      <circle cx="1070" cy="310" r="5" fill="#7f1d1d" stroke="#ef4444" stroke-width="1"/>
      <text x="1080" y="306" fill="#fca5a5" font-size="6">小怪</text>

      <!-- Scattered dogtags -->
      <text x="1000" y="305" font-size="6" fill="#fcd34d">🏷️</text>
      <text x="1045" y="295" font-size="6" fill="#fcd34d">🏷️</text>
      <text x="1035" y="338" font-size="6" fill="#fcd34d">🏷️</text>

      <!-- Special Boss dogtag -->
      <text x="1060" y="385" text-anchor="middle" fill="#fbbf24" font-size="7">⭐ Boss铭牌</text>
      <text x="1060" y="394" text-anchor="middle" fill="#d97706" font-size="6">名字被刮掉 · 发热</text>

      <!-- Phase labels around arena -->
      <text x="935" y="300" text-anchor="middle" fill="#fcd34d" font-size="7" font-weight="700">P1 并肩</text>
      <text x="935" y="310" text-anchor="middle" fill="#fcd34d" font-size="6">玩家+矮人</text>

      <text x="1100" y="305" text-anchor="middle" fill="#ef4444" font-size="7" font-weight="700">P2 反水</text>
      <text x="1100" y="315" text-anchor="middle" fill="#ef4444" font-size="6">矮人被感染</text>

      <text x="1100" y="335" text-anchor="middle" fill="#a5b4fc" font-size="7" font-weight="700">P3 释放</text>
      <text x="1100" y="345" text-anchor="middle" fill="#a5b4fc" font-size="6">菌丝出体</text>

      <text x="935" y="380" text-anchor="middle" fill="#4ade80" font-size="7" font-weight="700">P4 收尾</text>
